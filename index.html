<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panini WC2026 · Sticker Tracker</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Anybody:wght@700;800;900&family=Hanken+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <!-- TopAppBar -->
    <header id="top-bar">
        <div class="brand">
            <span class="material-symbols-outlined">menu</span>
            <h1>WC2026 · ALBUM</h1>
        </div>
        <div class="actions">
            <button id="btn-import">IMPORT</button>
            <button id="btn-export">EXPORT</button>
        </div>
    </header>

    <!-- Navigation latérale (desktop) -->
    <nav id="desktop-nav">
        <div class="nav-brand">STICKER TRACKER 2026</div>
        <ul>
            <li data-view="album" class="active"><span class="material-symbols-outlined">book</span> Album</li>
            <li data-view="country"><span class="material-symbols-outlined">flag</span> Par pays</li>
            <li data-view="missing"><span class="material-symbols-outlined">help_outline</span> Manquantes</li>
            <li data-view="duplicates"><span class="material-symbols-outlined">content_copy</span> Doublons</li>
            <li data-view="stats"><span class="material-symbols-outlined">query_stats</span> Stats</li>
            <li data-view="trade"><span class="material-symbols-outlined">handshake</span> Échanges</li>
        </ul>
    </nav>

    <!-- Conteneur principal -->
    <main id="main-content">
        <!-- Ici sera injecté le contenu de la vue active -->
    </main>

    <!-- Barre de navigation mobile -->
    <nav id="mobile-nav">
        <button data-view="album"><span class="material-symbols-outlined">book</span><span>Album</span></button>
        <button data-view="country"><span class="material-symbols-outlined">flag</span><span>Pays</span></button>
        <button data-view="missing" class="active"><span class="material-symbols-outlined">help_outline</span><span>Manque</span></button>
        <button data-view="duplicates"><span class="material-symbols-outlined">content_copy</span><span>Doublons</span></button>
        <button data-view="stats"><span class="material-symbols-outlined">query_stats</span><span>Stats</span></button>
        <button data-view="trade"><span class="material-symbols-outlined">handshake</span><span>Échanges</span></button>
    </nav>

    <!-- Input caché pour l'import -->
    <input type="file" id="file-input" accept=".json" style="display:none" />

    <script src="app.js"></script>
</body>
</html>
